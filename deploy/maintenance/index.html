<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta http-equiv="cache-control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <title>Tenant Mix Analytics — обновление</title>
  <style>
    :root{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#0f172a;background:#f5f7fb;--vvh:100dvh;--vvo:0px}
    *{box-sizing:border-box}
    html,body{margin:0;min-width:320px;min-height:100%;overflow:hidden;background:#f5f7fb}
    body{position:fixed;inset:0;min-height:var(--vvh);padding:calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom));background:radial-gradient(circle at 50% 8%,#fff 0,#f5f7fb 54%,#edf2f7 100%)}
    .viewport{position:absolute;left:0;top:var(--vvo);display:grid;place-items:center;width:100%;height:var(--vvh);padding:calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom))}
    main{width:min(520px,100%);padding:34px 32px;border:1px solid #dbe3ee;border-radius:24px;background:rgba(255,255,255,.96);box-shadow:0 22px 64px rgba(15,23,42,.12);text-align:center}
    .mark{display:grid;place-items:center;width:68px;height:68px;margin:0 auto 24px;border-radius:20px;background:linear-gradient(145deg,#059669,#047857);color:#fff;font-size:24px;font-weight:850;box-shadow:0 12px 28px rgba(4,120,87,.24)}
    h1{margin:0 0 12px;font-size:clamp(25px,5vw,32px);line-height:1.16;letter-spacing:-.025em}
    p{max-width:410px;margin:0 auto;color:#64748b;font-size:16px;line-height:1.55}
    .progress{height:6px;margin:28px 0 18px;overflow:hidden;border-radius:999px;background:#e2e8f0}.progress i{display:block;width:38%;height:100%;border-radius:999px;background:#059669;animation:move 1.6s ease-in-out infinite}
    small{color:#94a3b8}.reload{display:inline-flex;align-items:center;justify-content:center;min-height:44px;margin-top:22px;padding:0 18px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;color:#0f172a;text-decoration:none;font-weight:750;box-shadow:0 3px 10px rgba(15,23,42,.04)}
    .reload:active{transform:translateY(1px)}
    @keyframes move{0%{transform:translateX(-120%)}50%{transform:translateX(120%)}100%{transform:translateX(300%)}}
    @media(max-width:480px){.viewport{padding-inline:16px}main{width:min(100%,390px);padding:30px 22px;border-radius:22px}.mark{width:64px;height:64px;margin-bottom:22px}p{font-size:15.5px}.progress{margin-top:26px}}
    @media(max-height:650px){main{padding-block:24px}.mark{width:54px;height:54px;margin-bottom:16px;border-radius:16px}h1{font-size:24px}.progress{margin:20px 0 14px}.reload{margin-top:16px}}
    @media(prefers-reduced-motion:reduce){.progress i{animation:none;width:100%}}
  </style>
</head>
<body>
  <div class="viewport">
    <main role="status" aria-live="polite">
      <div class="mark">TM</div>
      <h1>Дашборд обновляется</h1>
      <p>Мы публикуем новую проверенную версию Tenant Mix Analytics. Обычно это занимает несколько минут.</p>
      <div class="progress" aria-hidden="true"><i></i></div>
      <small id="status">Проверяем готовность новой версии…</small><br />
      <a class="reload" id="reload" href="./">Проверить сейчас</a>
    </main>
  </div>
  <script>
    const basePath = '/tenant-mix-dashboard/';
    const status = document.getElementById('status');
    const setViewport = () => {
      const viewport = window.visualViewport;
      const height = viewport ? viewport.height : window.innerHeight;
      const offsetTop = viewport ? viewport.offsetTop : 0;
      document.documentElement.style.setProperty('--vvh', `${height}px`);
      document.documentElement.style.setProperty('--vvo', `${offsetTop}px`);
    };
    const openProduction = (build) => {
      const url = new URL(basePath, window.location.origin);
      url.searchParams.set('build', build || Date.now().toString());
      window.location.replace(url.toString());
    };
    const check = async () => {
      try {
        const response = await fetch(`${basePath}build-info.json?t=${Date.now()}`, { cache: 'no-store', headers: { 'cache-control': 'no-cache' } });
        if (!response.ok) throw new Error('not-ready');
        const info = await response.json();
        if (info && info.status === 'production' && info.build) return openProduction(info.build);
        status.textContent = 'Новая версия ещё проходит проверку.';
      } catch {
        status.textContent = 'Новая версия ещё проходит проверку.';
      }
    };
    document.getElementById('reload').addEventListener('click', (event) => { event.preventDefault(); check(); });
    setViewport();
    window.visualViewport?.addEventListener('resize', setViewport);
    window.visualViewport?.addEventListener('scroll', setViewport);
    window.addEventListener('resize', setViewport);
    check();
    window.setInterval(check, 8000);
  </script>
</body>
</html>

<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <meta http-equiv="refresh" content="30" />
  <title>Tenant Mix Analytics — обновление</title>
  <style>
    :root{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#0f172a;background:#f5f7fb}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top,#fff 0,#f5f7fb 55%,#eef2f7 100%)}
    main{width:min(520px,100%);padding:36px;border:1px solid #e2e8f0;border-radius:24px;background:rgba(255,255,255,.94);box-shadow:0 20px 60px rgba(15,23,42,.10);text-align:center}
    .mark{display:grid;place-items:center;width:64px;height:64px;margin:0 auto 24px;border-radius:18px;background:#047857;color:#fff;font-size:24px;font-weight:800}
    h1{margin:0 0 12px;font-size:28px;line-height:1.2}p{margin:0;color:#64748b;font-size:16px;line-height:1.55}
    .progress{height:6px;margin:28px 0 18px;overflow:hidden;border-radius:999px;background:#e2e8f0}.progress i{display:block;width:38%;height:100%;border-radius:999px;background:#047857;animation:move 1.6s ease-in-out infinite}
    small{color:#94a3b8}.reload{display:inline-flex;margin-top:22px;padding:10px 16px;border:1px solid #cbd5e1;border-radius:10px;color:#0f172a;text-decoration:none;font-weight:700}
    @keyframes move{0%{transform:translateX(-120%)}50%{transform:translateX(120%)}100%{transform:translateX(300%)}}
    @media(max-width:480px){main{padding:28px 22px;border-radius:20px}h1{font-size:24px}}
  </style>
</head>
<body>
  <main role="status" aria-live="polite">
    <div class="mark">TM</div>
    <h1>Дашборд обновляется</h1>
    <p>Мы публикуем новую проверенную версию Tenant Mix Analytics. Обычно это занимает несколько минут.</p>
    <div class="progress" aria-hidden="true"><i></i></div>
    <small>Страница обновится автоматически.</small><br />
    <a class="reload" href="./">Проверить сейчас</a>
  </main>
</body>
</html>

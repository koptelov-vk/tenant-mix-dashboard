name: Legacy tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      legacy: ${{ steps.filter.outputs.legacy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            legacy:
              - 'tests/**'
              - '.github/workflows/**'

  legacy-tests:
    needs: changes
    if: needs.changes.outputs.legacy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '11.9.0'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run legacy tests
        run: pnpm test:legacy

  legacy-gate:
    name: legacy-gate
    needs: [changes, legacy-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify legacy test result
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          LEGACY_RESULT: ${{ needs.legacy-tests.result }}
        run: |
          set -euo pipefail

          if [[ "$CHANGES_RESULT" != "success" ]]; then
            echo "::error::legacy changes detection must succeed, got: $CHANGES_RESULT"
            exit 1
          fi

          case "$LEGACY_RESULT" in
            success|skipped) ;;
            *)
              echo "::error::legacy-tests must be success or skipped, got: $LEGACY_RESULT"
              exit 1
              ;;
          esac

          echo "Legacy gate passed."

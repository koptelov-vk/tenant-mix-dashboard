name: Validate and deploy React dashboard

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

env:
  SNAPSHOT_DATE: '2026-07-16'

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: pip }
      - uses: pnpm/action-setup@v4
        with: { version: '11.9.0' }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: pnpm }
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Validate source data
        run: python scripts/validate_data.py
      - name: Build normalized aggregates
        run: python scripts/build_aggregates.py
      - name: Test data pipeline
        run: pnpm test:data
      - name: Unit and production data tests
        run: pnpm test
      - name: Build React production artifact
        run: pnpm build
      - name: Desktop, mobile and accessibility tests
        run: pnpm test:react:e2e
      - name: Lighthouse, three runs
        run: pnpm test:lighthouse
      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: react-dashboard-qa
          path: |
            playwright-report/
            test-results/
            artifacts/lighthouse/
            dist/
          if-no-files-found: ignore
      - name: Upload final Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: final-pages
          path: dist

  maintenance-artifact:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare maintenance artifact
        run: |
          rm -rf maintenance-dist
          mkdir maintenance-dist
          cp maintenance/index.html maintenance-dist/index.html
          touch maintenance-dist/.nojekyll
      - name: Upload maintenance Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: maintenance-pages
          path: maintenance-dist

  deploy-maintenance:
    needs: maintenance-artifact
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - name: Publish maintenance page
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: maintenance-pages

  deploy:
    needs: [quality, deploy-maintenance]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v5
      - name: Deploy verified dashboard
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: final-pages

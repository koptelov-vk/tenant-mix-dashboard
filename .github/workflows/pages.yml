name: Validate legacy and React migration

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Node.js dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Validate source data
        run: python scripts/validate_data.py

      - name: Build normalized aggregates
        run: python scripts/build_aggregates.py

      - name: Build standalone Dashboard 2.0
        run: python scripts/build_dashboard_v2.py

      - name: Legacy unit tests
        run: pnpm test:legacy

      - name: React unit tests
        run: pnpm test

      - name: Build React migration preview
        run: pnpm build

      - name: Desktop, mobile and accessibility tests
        run: pnpm test:e2e

      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-migration-qa
          path: |
            playwright-report/
            test-results/
            dist/
          if-no-files-found: ignore

      - name: Prepare Pages artifact
        run: |
          mkdir -p site
          cp index.html site/index.html
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
